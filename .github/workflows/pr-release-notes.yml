name: PR Release Notes

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  release-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Build changelog from PR commits
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@c9bcd8238b6f41e05561348339429d360b1c0247 # v6.2.3
        with:
          mode: "COMMIT"
          fromTag: ${{ github.event.pull_request.base.sha }}
          toTag: ${{ github.event.pull_request.head.sha }}
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "pr_template": "- #{{TITLE}} (#{{MERGE_SHA}})",
              "categories": [
                { "title": "## 🚀 Features", "labels": ["feat"] },
                { "title": "## 🐛 Fixes", "labels": ["fix"] },
                { "title": "## 🧹 Chores", "labels": ["chore"] },
                { "title": "## ♻️ Refactors", "labels": ["refactor"] },
                { "title": "## 📝 Docs", "labels": ["docs"] },
                { "title": "## Other", "labels": [] }
              ],
              "label_extractor": [
                {
                  "pattern": "^(feat|fix|chore|refactor|docs)(\\([\\w\\-\\.]+\\))?(!)?: ([\\w ])+([\\s\\S]*)",
                  "on_property": "title",
                  "target": "$1"
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find existing release-notes comment
        id: find_comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- pr-release-notes -->"

      - name: Post or update release-notes comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- pr-release-notes -->
            ## 📋 Release Notes (auto-generated)

            ${{ steps.build_changelog.outputs.changelog }}
